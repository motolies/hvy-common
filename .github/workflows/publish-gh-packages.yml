name: publish-gh-packages

# master에 포함된 커밋에 버전 태그(X.Y.Z)를 push하면 GitHub Packages에 자동 배포한다.
# GITHUB_TOKEN으로 인증하므로 별도 PAT가 필요 없고, GPG 키가 없으므로 서명은 생략된다(build.gradle 조건부 서명).
on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # master 포함 여부 검사용 전체 히스토리

      # 태그 커밋이 master 히스토리에 포함된 경우에만 배포 (아니면 잡 실패)
      - name: Verify tag is on master
        run: |
          git fetch origin master
          git merge-base --is-ancestor "$GITHUB_SHA" origin/master

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # 버전은 태그 이름(github.ref_name)을 그대로 사용 → publishVersion 이중 관리 없음
      - name: Publish to GitHub Packages
        env:
          GHP_USER: ${{ github.actor }}
          GHP_TOKEN: ${{ secrets.GHCR_PAT }}
        run: ./gradlew --no-daemon publishAllPublicationsToGitHubPackagesRepository -PpublishVersion=${{ github.ref_name }}
